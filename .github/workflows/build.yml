name: Build

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    container: flashlight13/godot:4.3
    steps:
      # check out git repository
    - name: Checkout repository
      uses: actions/checkout@v4
      # set up docker
    - name: Build
      run: |
        Build/build.bsh
    - uses: actions/upload-artifact@v4
      with:
        name: SnekStudio-linux-x86_64.tar.gz
        path: SnekStudio-linux-x86_64.tar.gz
      # if this was workflow was triggered by release creation, upload the build as the release assets
    - if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./SnekStudio-linux-x86_64.tar.gz
        asset_name: SnekStudio-linux-x86_64.tar.gz
        asset_content_type: application/zip
